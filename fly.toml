# Fly.io configuration for video generator with auto-scaling
app = "website-video-generator"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3030"

[http_service]
  internal_port = 3030
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 5

[[http_service.checks]]
  path = "/health"
  interval = "10s"
  timeout = "5s"

[[vm]]
  size = "performance-8x"
  memory = "16gb"
